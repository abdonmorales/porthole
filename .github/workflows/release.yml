name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gentoo-builder

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-gtk-3.0 \
            python3-gi \
            python3-gi-cairo

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install build pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Build sdist and wheel
        run: python -m build

      - name: Create Gentoo ebuild tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p gentoo-overlay/app-portage/porthole
          cp gentoo/porthole.ebuild \
            "gentoo-overlay/app-portage/porthole/porthole-${VERSION}.ebuild"
          cat > gentoo-overlay/app-portage/porthole/metadata.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE pkgmetadata SYSTEM "https://www.gentoo.org/dtd/metadata.dtd">
          <pkgmetadata>
            <maintainer type="person">
              <email>dol-sen@users.sourceforge.net</email>
              <name>Brian Dolbec</name>
            </maintainer>
            <longdescription>
              Porthole is a GTK+ frontend for Gentoo's Portage package management system.
            </longdescription>
            <upstream>
              <remote-id type="github">abdonmorales/porthole</remote-id>
            </upstream>
          </pkgmetadata>
          EOF
          tar czf "dist/porthole-gentoo-overlay-${VERSION}.tar.gz" -C gentoo-overlay .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/

  gentoo-build:
    name: Build & Test on Gentoo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Gentoo Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Test inside Gentoo container
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            sh -c "python -m pytest tests/ -v && python -m build && pip install dist/porthole-*.whl && python -c 'from porthole.version import version; print(\"Porthole\", version)'"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, gentoo-build]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/porthole-*.tar.gz
            dist/porthole-*.whl
          generate_release_notes: true
          draft: false
          prerelease: false
