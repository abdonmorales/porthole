name: Gentoo Build & Test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gentoo-builder

jobs:
  gentoo-docker-image:
    name: Build Gentoo Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  gentoo-test:
    name: Test on Gentoo
    runs-on: ubuntu-latest
    needs: gentoo-docker-image
    container:
      image: ${{ needs.gentoo-docker-image.outputs.image-tag }}
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Validate imports on Gentoo
        run: |
          python -c "
          import gi
          gi.require_version('Gtk', '3.0')
          from gi.repository import Gtk, Gdk, GdkPixbuf, GLib
          print('GTK version:', Gtk.get_major_version(), Gtk.get_minor_version())
          import portage
          print('Portage version:', portage.VERSION)
          print('All imports OK')
          "

      - name: Build package
        run: python -m build

      - name: Test installation
        run: |
          pip install dist/porthole-*.whl
          python -c "from porthole.version import version; print('Porthole', version)"

  gentoo-release:
    name: Gentoo Release Artifacts
    runs-on: ubuntu-latest
    needs: [gentoo-test]
    if: startsWith(github.ref, 'refs/tags/v')
    container:
      image: ${{ needs.gentoo-docker-image.outputs.image-tag || 'gentoo/stage3:latest' }}
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist and wheel
        run: python -m build

      - name: Create Gentoo overlay tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p gentoo-overlay/app-portage/porthole/files
          cp gentoo/porthole.ebuild \
            "gentoo-overlay/app-portage/porthole/porthole-${VERSION}.ebuild"
          # Generate a basic metadata.xml for the overlay
          cat > gentoo-overlay/app-portage/porthole/metadata.xml << 'METAEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE pkgmetadata SYSTEM "https://www.gentoo.org/dtd/metadata.dtd">
          <pkgmetadata>
            <maintainer type="person">
              <email>dol-sen@users.sourceforge.net</email>
              <name>Brian Dolbec</name>
            </maintainer>
            <longdescription>
              Porthole is a GTK+ frontend for Gentoo's Portage package management system.
              It provides a graphical interface for searching, installing, and managing
              packages on Gentoo Linux.
            </longdescription>
            <upstream>
              <remote-id type="github">abdonmorales/porthole</remote-id>
            </upstream>
          </pkgmetadata>
          METAEOF
          tar czf "dist/porthole-gentoo-overlay-${VERSION}.tar.gz" -C gentoo-overlay .

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gentoo-release
          path: dist/
