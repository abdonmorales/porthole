name: Gentoo Build & Test

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/gentoo-builder

jobs:
  gentoo-build-and-test:
    name: Build Image & Test on Gentoo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Test inside Gentoo container
        run: |
          docker run --rm -v ${{ github.workspace }}:/src -w /src \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            sh -c "
              python -m pytest tests/ -v &&
              python -c \"
                import gi
                gi.require_version('Gtk', '3.0')
                from gi.repository import Gtk, Gdk, GdkPixbuf, GLib
                print('GTK version:', Gtk.get_major_version(), Gtk.get_minor_version())
                import portage
                print('Portage version:', portage.VERSION)
                print('All imports OK')
              \" &&
              python -m build &&
              pip install dist/porthole-*.whl &&
              python -c 'from porthole.version import version; print(\"Porthole\", version)'
            "

      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: gentoo-build
          path: dist/
